<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Weather Journal</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
 <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
  margin: 0;
  min-height: 100vh;
  font-family: 'Poppins', sans-serif;

  display: flex;
  justify-content: center;
  align-items: center;

  background: linear-gradient(135deg, #141e30, #243b55);

  overflow-x: hidden; /* FIX */
}

/* Container */
.container {
  width: 90%;
  max-width: 350px;

  padding: 20px;
  border-radius: 20px;

  background: rgba(255, 255, 255, 0.08);
  backdrop-filter: blur(20px);

  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  color: white;

  box-sizing: border-box; /* FIX */
}

h1 {
  text-align: center;
  margin-bottom: 10px;
}

/* Inputs */
input {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  border-radius: 10px;
  border: none;
  outline: none;

  background: rgba(255,255,255,0.1);
  color: white;

  box-sizing: border-box; /* FIX */
}

/* Button */
button {
  width: 100%;
  padding: 12px;
  border-radius: 10px;
  border: none;
  margin-top: 8px;

  background: linear-gradient(135deg, #00f7ff, #0072ff);
  color: white;

  cursor: pointer;
  transition: 0.3s;

  box-sizing: border-box; /* FIX */
}

button:hover {
  transform: translateY(-2px);
  background: #005bea;
}

/* Entries */
ul {
  list-style: none;
  padding: 0;
  max-height: 130px;
  overflow-y: auto;
}

/* Entry item */
li {
  background: rgba(255,255,255,0.2);
  padding: 10px;
  margin: 6px 0;
  border-radius: 8px;

  word-wrap: break-word; /* FIX */
}</style>
</head>
<body>

<div class="container">
  <h2>🌦️ Weather Journal</h2>

  <!-- Inputs -->
  <input type="date" id="date">
  <input type="number" id="temp" placeholder="Temperature °C">
  <input type="text" id="note" placeholder="Note (Sunny, Rainy...)">
  <button onclick="addEntry()">Add Entry</button>

  <!-- Entries -->
  <h3>Entries</h3>
  <ul id="entries"></ul>

  <!-- Stats -->
  <h3>Stats</h3>
  <p>Average Temp: <span id="avg">0</span> °C</p>
  <p>Best Day: <span id="best">-</span></p>
  <p>Worst Day: <span id="worst">-</span></p>

  <!-- Weekly -->
  <h3>Weekly Summary</h3>
  <p>This Week Avg: <span id="weekAvg">0</span> °C</p>
  <p>Entries This Week: <span id="weekCount">0</span></p>

  <!-- Export -->
  <button onclick="exportData()">Export Report</button>
</div>

<script>let data = JSON.parse(localStorage.getItem("weatherData")) || [];

// Add entry
function addEntry() {
  let date = document.getElementById("date").value;
  let temp = document.getElementById("temp").value;
  let note = document.getElementById("note").value;

  if (!date || !temp || !note) {
    alert("Please fill all fields");
    return;
  }

  let entry = {
    date: date,
    temp: Number(temp),
    note: note
  };

  data.push(entry);
  localStorage.setItem("weatherData", JSON.stringify(data));

  displayEntries();
  calculateStats();
  calculateWeeklySummary();
}

// Show entries
function displayEntries() {
  let list = document.getElementById("entries");
  list.innerHTML = "";

  data.forEach(e => {
    let li = document.createElement("li");
    li.innerText = `${e.date} - ${e.temp}°C - ${e.note}`;
    list.appendChild(li);
  });
}

// Stats
function calculateStats() {
  if (data.length === 0) return;

  let total = 0;
  let best = data[0];
  let worst = data[0];

  data.forEach(e => {
    total += e.temp;
    if (e.temp > best.temp) best = e;
    if (e.temp < worst.temp) worst = e;
  });

  document.getElementById("avg").innerText = (total / data.length).toFixed(2);
  document.getElementById("best").innerText = best.date;
  document.getElementById("worst").innerText = worst.date;
}

// Weekly summary
function calculateWeeklySummary() {
  let today = new Date();
  let weekAgo = new Date();
  weekAgo.setDate(today.getDate() - 7);

  let weekData = data.filter(e => {
    let d = new Date(e.date);
    return d >= weekAgo && d <= today;
  });

  document.getElementById("weekCount").innerText = weekData.length;

  if (weekData.length === 0) {
    document.getElementById("weekAvg").innerText = 0;
    return;
  }

  let total = 0;
  weekData.forEach(e => total += e.temp);

  document.getElementById("weekAvg").innerText = (total / weekData.length).toFixed(2);
}

// Export
function exportData() {
  let text = "Weather Journal Report\n\n";

  data.forEach(e => {
    text += `${e.date} - ${e.temp}°C - ${e.note}\n`;
  });

  let blob = new Blob([text], { type: "text/plain" });
  let a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "weather_report.txt";
  a.click();
}

// Load on start
window.onload = function () {
  displayEntries();
  calculateStats();
  calculateWeeklySummary();
};</script>
</body>
</html>
