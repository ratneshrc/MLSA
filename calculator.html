<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Calculator Pro</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: 'Poppins', sans-serif;
  background: linear-gradient(135deg, #141e30, #243b55);
}

.calculator {
  width: 300px;
  padding: 20px;
  border-radius: 20px;
  background: rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  box-shadow: 0 10px 40px rgba(0,0,0,0.6);
  color: white;
}

h2 {
  text-align: center;
  margin-bottom: 10px;
}

#display {
  width: 100%;
  height: 55px;
  border-radius: 10px;
  border: none;
  padding: 10px;
  font-size: 20px;
  text-align: right;
  background: rgba(255,255,255,0.1);
  color: white;
  margin-bottom: 10px;
}

.buttons {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 10px;
}

button {
  padding: 14px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #00f7ff, #0072ff);
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.2s;
}

button:hover {
  transform: translateY(-2px);
  background: #005bea;
}

.equal {
  background: #00ff99;
  color: black;
}

.clear {
  background: #ff4d4d;
}

.delete {
  background: #ff944d;
}

.zero {
  grid-column: span 2;
}

/* Continue Button */
.continue-btn {
  margin-top: 15px;
  width: 100%;
}
</style>
</head>

<body>

<div class="calculator">
  <h2>Calculator Pro</h2>

  <input type="text" id="display" disabled>

  <div class="buttons">
    <button class="clear" onclick="clearDisplay()">C</button>
    <button class="delete" onclick="deleteLast()">⌫</button>
    <button onclick="append('/')">/</button>
    <button onclick="append('*')">*</button>

    <button onclick="append('7')">7</button>
    <button onclick="append('8')">8</button>
    <button onclick="append('9')">9</button>
    <button onclick="append('-')">-</button>

    <button onclick="append('4')">4</button>
    <button onclick="append('5')">5</button>
    <button onclick="append('6')">6</button>
    <button onclick="append('+')">+</button>

    <button onclick="append('1')">1</button>
    <button onclick="append('2')">2</button>
    <button onclick="append('3')">3</button>
    <button class="equal" onclick="calculate()">=</button>

    <button class="zero" onclick="append('0')">0</button>
    <button onclick="append('.')">.</button>
  </div>

  <!-- Continue Button -->
  <button class="continue-btn" onclick="goToNext()">Continue ➡️</button>
</div>

<script>
let display = document.getElementById("display");

function append(value) {
  display.value += value;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}

/* Keyboard Support */
document.addEventListener("keydown", function(e) {
  if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
    append(e.key);
  } else if (e.key === "Enter") {
    calculate();
  } else if (e.key === "Backspace") {
    deleteLast();
  }
});

/* Navigation */
function goToNext() {
  window.location.href = "weather.html"; // change if needed
}
</script>

</body>
</html>
