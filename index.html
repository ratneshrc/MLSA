<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator Pro</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
  <style>@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap');

body {
  margin: 0;
  min-height: 100vh;

  display: flex;
  justify-content: center;
  align-items: center;

  font-family: 'Poppins', sans-serif;

  /* NEW CLEAN BACKGROUND */
  background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);

  overflow: hidden;
}

/* Calculator */
.calculator {
  width: 90%;
  max-width: 320px;

  padding: 25px;
  border-radius: 25px;

  background: rgba(255,255,255,0.06);
  backdrop-filter: blur(15px);

  box-shadow:
    0 10px 30px rgba(0,0,0,0.6),
    inset 0 0 10px rgba(255,255,255,0.1);

  color: white;
  overflow: hidden;
}

/* Title */
.title {
  text-align: center;
  margin-bottom: 15px;
}

/* Display */
#display {
  width: 100%;
  height: 65px;

  border-radius: 12px;
  border: none;
  outline: none;

  padding: 10px;
  font-size: 24px;
  text-align: right;

  background: rgba(255,255,255,0.08);
  color: white;

  box-sizing: border-box;

  overflow-x: auto;
  white-space: nowrap;
}

/* Grid */
.buttons {
  margin-top: 18px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 12px;
}

/* Buttons */
button {
  padding: 15px;
  border-radius: 12px;
  border: none;

  background: rgba(255,255,255,0.1);
  color: white;

  cursor: pointer;
  transition: 0.2s;

  box-shadow: 0 4px 10px rgba(0,0,0,0.4);
}

/* Hover */
button:hover {
  transform: scale(1.05);
  background: #00c6ff;
}

/* Special buttons */
button:nth-child(1) { background: #ff4d4d; }
button:nth-child(2) { background: #ff944d; }

button:nth-child(4),
button:nth-child(8),
button:nth-child(12),
button:nth-child(16) {
  background: #00c6ff;
}

/* Equals */
button:nth-child(16) {
  background: #00ff99;
  color: black;
}

/* Zero */
.zero {
  grid-column: span 2;
}</style>
</head>
<body>

<div class="calculator">
  <h2 class="title">Calculator Pro</h2>

  <!-- Display -->
  <input type="text" id="display" disabled>

  <!-- Buttons -->
  <div class="buttons">
    <button onclick="clearDisplay()">C</button>
    <button onclick="deleteLast()">⌫</button>
    <button onclick="appendValue('/')">/</button>
    <button onclick="appendValue('*')">*</button>

    <button onclick="appendValue('7')">7</button>
    <button onclick="appendValue('8')">8</button>
    <button onclick="appendValue('9')">9</button>
    <button onclick="appendValue('-')">-</button>

    <button onclick="appendValue('4')">4</button>
    <button onclick="appendValue('5')">5</button>
    <button onclick="appendValue('6')">6</button>
    <button onclick="appendValue('+')">+</button>

    <button onclick="appendValue('1')">1</button>
    <button onclick="appendValue('2')">2</button>
    <button onclick="appendValue('3')">3</button>
    <button onclick="calculate()">=</button>

    <button class="zero" onclick="appendValue('0')">0</button>
    <button onclick="appendValue('.')">.</button>
  </div>
</div>

<script>let display = document.getElementById("display");

function appendValue(value) {
  display.value += value;
}

function clearDisplay() {
  display.value = "";
}

function deleteLast() {
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    display.value = eval(display.value);
  } catch {
    display.value = "Error";
  }
}

// Keyboard support
document.addEventListener("keydown", function(e) {
  if (!isNaN(e.key) || "+-*/.".includes(e.key)) {
    appendValue(e.key);
  } else if (e.key === "Enter") {
    calculate();
  } else if (e.key === "Backspace") {
    deleteLast();
  }
});
</script>
</body>
</html>
